name: jules-subagent
version: 1.0.0
description: Delegate coding tasks to Google's Jules async coding agent with full workflow automation
author: chieji
license: MIT
repository: https://github.com/Chieji/jules-subagent-skill

# Keywords for discovery
keywords:
  - jules
  - google
  - async
  - coding-agent
  - delegation
  - code-generation
  - ai-assistant
  - sub-agent

# Skill configuration
skill:
  type: automation
  priority: high
  
  # Trigger patterns - will be indexed for fast matching
  triggers:
    exact:
      - ask Jules to
      - delegate to Jules
      - let Jules handle
    contains:
      - Jules should write
      - get Jules to
      - use Jules for
      - what did Jules do
      - check Jules
      - apply Jules'
    
  # Files that make up this skill
  entrypoint: SKILL.md
  files:
    - README.md
    - CHANGELOG.md
    - LICENSE
    - setup.yaml
    - scripts/jules_delegate.sh
    - scripts/jules_status.sh
    - tests/test_jules_delegate.sh
    - tests/test_jules_status.sh
    - tests/run_tests.sh

# Dependencies
requires:
  system:
    - jules
    - git
    - sh
  optional:
    - gh (GitHub CLI)

# Memory entries to persist after installation
memory:
  category: agent-tools
  importance: high
  entries:
    - Jules CLI requires --repo flag for session creation
    - Never auto-apply Jules output - always review first
    - Default repository: Chieji/jules-subagent-skill
    - Session storage: /var/minis/workspace/jules_work/

# ClawHub registry metadata
clawhub:
  category: agent-orchestration
  tags:
    - coding
    - automation
    - external-agent
    - jules
    - google-ai
  rating: 5
  downloads: 0
  published: 2025-01-20
